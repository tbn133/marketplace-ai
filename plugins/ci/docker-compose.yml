services:
  # ---- Infrastructure ----
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/code_intel_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: code_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: code_intel_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ---- Application ----
  api:
    build:
      context: .
      target: api
    env_file: .env.local
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # On-demand CLI for indexing (run manually)
  # Usage: docker compose run --rm cli index /repos/myproject --project myproject
  cli:
    build:
      context: .
      target: cli
    env_file: .env.local
    volumes:
      - ./repos:/repos:ro          # Mount your repos here
      - ./data:/app/data           # Shared data dir for local fallback
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    profiles: ["cli"]              # Only runs on-demand

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:
  redis_data:
